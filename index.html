<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía del Método Celidiano</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #2c3e50; }
        .audio-wrapper {
            margin: 30px 0;
            padding: 15px;
            background: #eee;
            border-radius: 10px;
        }
        audio { width: 100%; }
        .cta-button {
            display: inline-block;
            background-color: #25d366;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .cta-button:hover { background-color: #128c7e; }
    </style>
</head>
<body>

<div class="container">
    <h1>Guía del Método Celidiano</h1>
    <p>Escucha las instrucciones antes de comenzar tu experiencia de introspección.</p>

    <!-- Reproductor de audio nativo (incluye barra, play, pausa y volumen) -->
    <div class="audio-wrapper">
        <audio controls>
            <source src="/guia-celidiano.mp3" type="audio/mpeg">
            Tu navegador no soporta el audio. Actualízalo para continuar.
        </audio>
    </div>

    <p>¿Listo para comenzar?</p>
    <a href="https://wa.me/TUNUMERO" class="cta-button">Iniciar sesión en WhatsApp</a>
</div>

</body>
</html>
